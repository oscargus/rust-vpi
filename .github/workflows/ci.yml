name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run Rust tests with all features
        run: cargo test --workspace --all-targets --all-features

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run testbench script
        run: bash test_scripts/run_testbench.sh

      - name: Run dumper script
        run: bash test_scripts/run_dumper.sh

      - name: Run timescale script
        run: bash test_scripts/run_timescale_test.sh