[workspace]
members = ["vpi", "vpi-sys", "examples/siminfo", "examples/timescale", "examples/dumper"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
authors = ["Oscar Gustafsson <oscar.gustafsson@gmail.com>"]
repository = "https://github.com/oscargus/rust-vpi"

[workspace.dependencies]
bindgen = "0.72.1"
bitflags = "2"
num-traits = "0.2"
num-derive = "0.4"
vpi-sys = { version = "0.1.0", path = "vpi-sys" }
vpi = { version = "0.1.0", path = "vpi" }
